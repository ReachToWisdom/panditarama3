<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#e94560">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <title>빤디따라마 영상</title>
</head>
<body>
  <!-- 상단 바 -->
  <div class="top-bar">
    <h1>빤디따라마 영상</h1>
    <button id="btn-share" title="공유">📤</button>
    <button id="btn-theme" title="테마 전환">☀️</button>
    <button id="btn-settings" title="설정">⚙️</button>
  </div>

  <!-- 검색 -->
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="영상 검색...">
  </div>

  <!-- 필터 -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">전체</button>
    <button class="filter-btn" data-filter="unwatched">미시청</button>
    <button class="filter-btn" data-filter="starred">별표</button>
    <button class="filter-btn" data-filter="noted">메모</button>
    <button class="filter-btn" data-filter="watched">시청완료</button>
  </div>

  <!-- 이어보기 카드 -->
  <div class="resume-card hidden" id="resume-card">
    <span class="resume-icon">▶</span>
    <div class="resume-info">
      <div class="resume-title" id="resume-title"></div>
      <div class="resume-sub" id="resume-sub"></div>
    </div>
  </div>

  <!-- 전체 진행률 -->
  <div class="progress-section">
    <div class="progress-label">
      <span>전체 진행률</span>
      <span id="progress-text">0/258 (0%)</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- 카테고리 순서 프리셋 -->
  <div class="preset-bar">
    <span class="preset-label">순서:</span>
    <button class="preset-btn active" data-preset="count">영상수</button>
    <button class="preset-btn" data-preset="chronological">등록순</button>
    <button class="preset-btn" data-preset="latest">최신순</button>
    <button class="preset-btn" data-preset="historical">설법순</button>
    <button class="preset-btn" data-preset="beginner">초보자</button>
    <button class="preset-btn" data-preset="practitioner">수행자</button>
  </div>

  <!-- 카테고리 목록 -->
  <div id="category-list"></div>

  <!-- 플로팅 재생 버튼 (드래그 가능) -->
  <div class="fab-play" id="fab-play" title="이어서 재생">
    <span class="fab-icon">▶</span>
    <span class="fab-text" id="fab-text">재생</span>
  </div>

  <!-- 플로팅 버튼 메뉴 (길게 누르기) -->
  <div class="fab-menu hidden" id="fab-menu">
    <button data-fab="resume">▶ 이어보기</button>
    <button data-fab="restart">⏮ 처음부터</button>
    <button data-fab="first">1️⃣ 첫 영상부터</button>
  </div>

  <!-- 플레이어 모달 -->
  <div class="modal-overlay" id="player-overlay">
    <div class="modal player-modal">
      <div class="player-container">
        <div id="player-wrapper"></div>
      </div>
      <div class="player-info">
        <h4 id="player-title"></h4>
        <div class="player-controls">
          <button id="btn-prev" title="이전 영상">⏮</button>
          <button id="btn-repeat" title="반복 재생">🔁 끔</button>
          <button id="btn-next" title="다음 영상">⏭</button>
          <button id="btn-ab-a" title="A점 설정">A</button>
          <button id="btn-ab-b" title="B점 설정" disabled>B</button>
          <button id="btn-ab-clear" title="구간 초기화" class="hidden">✕ 구간해제</button>
          <button id="btn-mark-watched" title="시청 완료">✓ 완료</button>
          <button id="btn-lock" title="화면 잠금 (주머니 모드)">🔒</button>
          <button id="btn-close-player" title="닫기">✕ 닫기</button>
        </div>
        <div id="ab-status" class="hidden" style="margin-top:8px;font-size:12px;color:var(--accent)"></div>
        <div id="next-info" style="margin-top:6px;font-size:11px;color:var(--text-muted)"></div>
      </div>
    </div>
  </div>

  <!-- 설정 모달 -->
  <div class="modal-overlay" id="settings-overlay">
    <div class="modal">
      <h3>설정</h3>
      <div class="settings-group">
        <label>
          카테고리 내 정렬
          <select id="sort-select">
            <option value="order">강 번호순</option>
            <option value="title">제목순</option>
            <option value="watched">시청일순</option>
          </select>
        </label>
      </div>
      <div class="settings-group">
        <label>
          연속 재생
          <select id="autoplay-select">
            <option value="on">켜기 (다음 영상 자동 재생)</option>
            <option value="off">끄기</option>
          </select>
        </label>
      </div>
      <div class="settings-group">
        <label>
          전체 펼치기/닫기
          <button id="btn-toggle-all" class="btn-secondary" style="font-size:12px">전체 펼치기</button>
        </label>
      </div>
      <hr style="border:none;border-top:1px solid var(--border);margin:12px 0">
      <h3>바로가기</h3>
      <div id="shortcut-section" style="margin-top:8px">
        <button class="btn-primary" id="btn-add-shortcut" style="width:100%;text-align:left;padding:12px 16px">
          📲 홈 화면에 추가 (앱처럼 사용)
        </button>
        <div id="shortcut-guide" class="hidden" style="margin-top:8px;padding:12px;background:var(--bg);border-radius:8px;font-size:13px;line-height:1.6">
        </div>
      </div>
      <hr style="border:none;border-top:1px solid var(--border);margin:12px 0">
      <h3>데이터 관리</h3>
      <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
        <button class="btn-primary" id="btn-export">내보내기</button>
        <button class="btn-secondary" id="btn-import">가져오기</button>
        <button class="btn-secondary" id="btn-reset" style="color:#e94560">초기화</button>
      </div>
      <input type="file" id="import-file" accept=".json" class="hidden">
      <hr style="border:none;border-top:1px solid var(--border);margin:12px 0">
      <div style="text-align:right">
        <button class="btn-secondary" id="btn-close-settings">닫기</button>
      </div>
    </div>
  </div>

  <!-- 화면 잠금 (주머니 모드) -->
  <div class="lock-overlay hidden" id="lock-overlay">
    <div class="lock-content">
      <div class="lock-icon">🔒</div>
      <div class="lock-text">화면 잠금 중</div>
      <div class="lock-hint">해제: 길게 누르기 (2초)</div>
      <div class="lock-progress" id="lock-progress"></div>
    </div>
  </div>

  <!-- 설치 배너 -->
  <div class="install-banner hidden" id="install-banner">
    <div class="install-text">
      <strong>앱으로 설치하기</strong>
      <span id="install-desc">홈 화면에 추가하면 앱처럼 사용할 수 있어요</span>
    </div>
    <button id="btn-install" class="btn-primary">설치</button>
    <button id="btn-install-close" class="install-close">✕</button>
  </div>

  <!-- 토스트 -->
  <div class="toast" id="toast"></div>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="videos.js"></script>
  <script src="app.js"></script>
</body>
</html>
